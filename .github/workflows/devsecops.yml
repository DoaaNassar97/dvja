name: DevSecOps Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-java-app:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Run Gitleaks secrets scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Check Java version
        run: java -version

      - name: Build application with Maven
        run: mvn clean package -DskipTests

      - name: Run Trivy SCA scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'

      - name: Build Docker image
        run: docker build -t dvja:latest .

      - name: Run Trivy container scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: 'dvja:latest'
          format: 'json'
          output: 'trivy-image-report.json'
          exit-code: '0
          
      - name: Create GitHub issue for High/Critical container findings
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const reportPath = 'trivy-image-report.json';

            if (!fs.existsSync(reportPath)) {
              console.log('Trivy report not found.');
              return;
            }

            const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));

            let findings = [];

            for (const result of report.Results || []) {
              for (const vuln of result.Vulnerabilities || []) {
                if (vuln.Severity === 'HIGH' || vuln.Severity === 'CRITICAL') {
                  findings.push({
                    severity: vuln.Severity,
                    vulnId: vuln.VulnerabilityID,
                    pkg: vuln.PkgName,
                    installed: vuln.InstalledVersion || 'N/A',
                    fixed: vuln.FixedVersion || 'N/A',
                    title: vuln.Title || 'No title'
                  });
                }
              }
            }

            if (findings.length === 0) {
              console.log('No HIGH or CRITICAL vulnerabilities found.');
              return;
            }

            const bodyLines = findings.slice(0, 20).map(f =>
              `- **${f.severity}** | ${f.vulnId} | Package: \`${f.pkg}\` | Installed: \`${f.installed}\` | Fixed: \`${f.fixed}\` | ${f.title}`
            );

            const body = `
            Trivy detected High/Critical vulnerabilities in the Docker image.

            **Image:** \`dvja:latest\`

            **Top findings:**
            ${bodyLines.join('\n')}

            Please review the full pipeline logs for complete results.
            `;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Trivy High/Critical container vulnerabilities detected',
              body: body,
              labels: ['security', 'trivy', 'container-scan']
            });

      - name: Show Trivy report file
        run: ls -la trivy-image-report.json

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag Docker image
        run: docker tag dvja:latest ${{ secrets.DOCKERHUB_USERNAME }}/dvja:latest

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/dvja:latest
  codeql-analysis:
    name: CodeQL SAST Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3